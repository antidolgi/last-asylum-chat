<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Last Asylum Alliance Chat</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <h1>⚔️ LAST ASYLUM ⚔️</h1>
    <div class="subtitle">Чат альянса • Синхронизация с Telegram и VK</div>
  </header>

  <div class="container">
    <div class="chat-window">
      <div class="status-bar">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Подключение...</span>
      </div>
      
      <div class="chat-messages" id="chatMessages">
        <!-- Сообщения будут здесь -->
      </div>
      
      <div class="chat-input">
        <div class="input-row">
          <input type="text" id="nickname" placeholder="Ваш ник (обязательно)" maxlength="20" />
          <input type="text" id="message" placeholder="Сообщение..." maxlength="500" />
          <input type="file" id="imageInput" accept="image/*" />
          <label for="imageInput">📷</label>
          <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
        <div id="imagePreview" style="display:none; font-size:0.85rem; color:var(--text-muted);">
          📎 Файл выбран: <span id="fileName"></span>
        </div>
      </div>
    </div>
    
    <div style="text-align:center; margin-top:1rem; color:var(--text-muted); font-size:0.85rem;">
      <p>💡 Если Telegram не работает — пишите здесь, сообщение уйдёт в чат альянса</p>
      <p>🔒 Сообщения синхронизируются с официальными каналами альянса</p>
    </div>
  </div>

  <!-- Модальное окно для просмотра картинки -->
  <div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center;">
    <img id="modalImage" style="max-width:90%; max-height:90%; border:2px solid var(--primary); border-radius:4px;" />
    <button onclick="closeModal()" style="position:absolute; top:20px; right:20px; background:var(--danger); color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer;">✕ Закрыть</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
